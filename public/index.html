  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Index header: the big sprout/NMR logo stands to the left, spanning the
       full height of the blue GOOD NEWS panel plus the tagline centred beneath
       it. (No small NMR mark.) */
    .index-hero { display: flex; align-items: flex-start; gap: 0; padding: 2px 8px; }
    /* logo box keeps the blue panel beside the top of the logo; the taller logo
       overflows downward into the left column below. */
    .index-hero .ih-logo { flex-shrink: 0; height: 98px; overflow: visible; }
    .index-hero .ih-logo .sprout-logo { display: block; height: 196px; width: auto; margin: 0; image-rendering: pixelated; }
    .index-hero .ih-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    /* blue panel height = the N glyph's height (rows 0-4 of the 17-row logo) so
       its top and bottom line up with the N */
    .index-hero .ih-right .ceefax-banner-title { height: 58px; flex: none; }
    .index-hero .ih-tagline {
      height: 34px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--W);
      text-transform: uppercase;
      font-size: var(--font-size);
      padding: 0 8px;
    }
    .index-hero .ih-tagline .sh-page { position: absolute; right: 8px; color: var(--Y); }
    /* the doubled logo overflows down into the left column, so drop the
       crystal-ball promo below it */
    .ceefax-graphic { top: 232px; }

    /* Horoscopes promo — now the sole graphic in the left column */
    .index-horo {
      display: block;
      width: 150px;
      margin: 22px auto 0;
      text-decoration: none;
      text-align: center;
    }
    .index-horo svg { display: block; width: 118px; margin: 0 auto; image-rendering: pixelated; }
    .index-horo .cap { color: var(--Y); font-size: 15px; line-height: 17px; margin-top: 6px; }
    .index-horo .pg  { color: var(--C); }
    .index-horo:hover .cap, .index-horo:hover .pg { color: var(--C); }
    .index-horo:hover .cap { color: var(--W); }
  </style>
</head>
<body>
  <div class="ceefax-page">
    <div id="header"></div>

    <div class="ceefax-content" id="content">
      <div class="index-stories">
        <div class="ceefax-hl-cyan">HEADLINES</div>
        <div id="stories"><div class="ceefax-loading">LOADING...</div></div>
      </div>
    </div>

    <div class="ceefax-fastext" id="fastext"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common.js"></script>
  <script>
    CX.renderHeader('100', 'GOOD NEWS', 'GOOD NEWS IN GAMES')
    // Rebuild the index banner: big sprout/NMR logo on the left spanning the
    // blue GOOD NEWS panel and the tagline centred beneath it (no small NMR).
    ;(function () {
      var header = document.getElementById('header')
      var banner = header.querySelector('.ceefax-banner')
      var title = header.querySelector('.ceefax-banner-title')   // blue GOOD NEWS
      var subhead = header.querySelector('.ceefax-subhead')
      var tag = subhead.querySelector('.sh-text').textContent    // GOOD NEWS IN GAMES
      var pg = subhead.querySelector('.sh-page').textContent      // 100

      var hero = document.createElement('div')
      hero.className = 'index-hero'
      hero.innerHTML = '<div class="ih-logo">' +
        '<img class="sprout-logo" src="/images/nmr-logo-native.png" alt="NMR — No More Robots" />' +
        '</div><div class="ih-right"></div>'
      var right = hero.querySelector('.ih-right')
      right.appendChild(title)   // move the blue panel into the right column
      right.insertAdjacentHTML('beforeend',
        '<div class="ih-tagline"><span>' + tag + '</span>' +
        '<span class="sh-page">' + pg + '</span></div>')

      banner.replaceWith(hero)
      subhead.remove()
    })()
    // Left column now carries just the horoscopes crystal-ball promo.
    document.getElementById('content').insertAdjacentHTML('afterbegin', '<div class="ceefax-graphic"></div>')
    var stopScan = CX.scanPage('100')

    // A crystal-ball promo under the sprout logo, linking to the horoscopes.
    ;(function () {
      var BALL = [
        '..........................', '..........................', '..........................',
        '.....M................M...', '.....................MMM..', '...C......WWWWWW......M...',
        '..CCC...WWWWWWWWWW........', '...C...WWWWWWWWWWWW.......', '......WCCCCCCWWWWWWW......',
        '......CCWWWWCCWWWWWW....W.', '.....CCWWWWMWWWWWWWWW.....', '.....CWWWWMMMWWWWWWWW.....',
        '.....WWWWWWMWWWWWWWWW.....', '.....WWWWWWWWWWWWWWWW.....', '..W..WWWWWWWWWWWWWWWW.....',
        '.....WWWWWWWWWWWWWWWW.....', '......WWWWWWWWWWWWWW.M....', '......CWWWWWWWWWWWWW......',
        '.......CWWWWCCWWWWW.......', '........CCCCCWWWWW........', '..........CWWWWC..........',
        '.........CCCCCCC..........',
      ]
      var COL = { W: 'var(--W)', C: 'var(--C)', M: 'var(--M)' }
      var rects = ''
      for (var r = 0; r < BALL.length; r++) {
        for (var c = 0; c < BALL[r].length; c++) {
          var col = COL[BALL[r][c]]
          if (col) rects += '<rect x="' + c + '" y="' + r + '" width="0.9" height="0.9" fill="' + col + '"/>'
        }
      }
      var svg = '<svg viewBox="0 0 26 22" shape-rendering="crispEdges" role="img" ' +
        'aria-label="Crystal ball">' + rects + '</svg>'
      var promo = '<a class="index-horo" href="/horoscopes.html">' + svg +
        '<div class="cap">YOUR STARS <span class="pg">P560</span></div></a>'
      var col = document.querySelector('.ceefax-graphic')
      if (col) col.insertAdjacentHTML('beforeend', promo)
    })()

    ;(async function () {
      var host = document.getElementById('stories')
      // Hold LOADING... for at least 1s, even if the fetch returns sooner.
      var results = await Promise.all([
        CX.db.from('ceefax_stories').select('page_number, title, category').order('page_number', { ascending: false }),
        CX.delay(1000),
      ])
      stopScan()
      var res = results[0]

      if (res.error || !res.data) {
        host.innerHTML = '<div class="ceefax-body">Could not load stories.</div>'
        return
      }
      var stories = res.data

      host.innerHTML = stories.map(function (s) {
        return '<a class="index-story-row" href="/story.html?p=' + s.page_number + '">' +
          '<span class="index-pn">P' + s.page_number + '</span>' +
          '<span class="index-cat">' + CX.escapeHTML(s.category) + '</span>' +
          '<span class="index-title">' + CX.escapeHTML(s.title) + '</span>' +
          '</a>'
      }).join('') +
        // Standing service pages below the stories, like a real Ceefax index.
        '<a class="index-story-row" href="/horoscopes.html">' +
          '<span class="index-pn">P560</span>' +
          '<span class="index-cat">STARS</span>' +
          '<span class="index-title">Your Stars &mdash; Mystic Meg\'s daily horoscopes</span>' +
        '</a>'

      var first = stories.length ? stories[0].page_number : 101
      var last = stories.length ? stories[stories.length - 1].page_number : 101
      CX.renderFastext([
        { color: 'red',    label: 'TOP STORY', href: '/story.html?p=' + first },
        { color: 'green',  label: 'WEATHER',   href: '/weather.html' },
        { color: 'yellow', label: 'SPORT',     href: '/sport.html' },
        { color: 'cyan',   label: 'ADMIN',     href: '/admin.html' },
      ])
    })()
  </script>
</body>
