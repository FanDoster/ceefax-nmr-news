<body>
  <div class="ceefax-page">
    <div id="header"></div>

    <div class="ceefax-content" id="content">
      <div class="index-stories">
        <div class="ceefax-hl-cyan">HEADLINES</div>
        <div id="stories"><div class="ceefax-loading">LOADING...</div></div>
      </div>
    </div>

    <div class="ceefax-fastext" id="fastext"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common.js"></script>
  <script>
    CX.renderHeader('100', 'GOOD NEWS', 'GOOD NEWS IN GAMES')
    document.getElementById('content').insertAdjacentHTML('afterbegin', CX.mascotHTML())
    var stopScan = CX.scanPage('100')

    ;(async function () {
      var host = document.getElementById('stories')
      // Hold LOADING... for at least 1s, even if the fetch returns sooner.
      var results = await Promise.all([
        CX.db.from('ceefax_stories').select('page_number, title, category').order('page_number', { ascending: false }),
        CX.delay(1000),
      ])
      stopScan()
      var res = results[0]

      if (res.error || !res.data) {
        host.innerHTML = '<div class="ceefax-body">Could not load stories.</div>'
        return
      }
      var stories = res.data

      host.innerHTML = stories.map(function (s) {
        return '<a class="index-story-row" href="/story.html?p=' + s.page_number + '">' +
          '<span class="index-pn">P' + s.page_number + '</span>' +
          '<span class="index-cat">' + CX.escapeHTML(s.category) + '</span>' +
          '<span class="index-title">' + CX.escapeHTML(s.title) + '</span>' +
          '</a>'
      }).join('')

      var first = stories.length ? stories[0].page_number : 101
      var last = stories.length ? stories[stories.length - 1].page_number : 101
      CX.renderFastext([
        { color: 'red',    label: 'TOP STORY', href: '/story.html?p=' + first },
        { color: 'green',  label: 'WEATHER',   href: '/weather.html' },
        { color: 'yellow', label: 'SPORT',     href: '/sport.html' },
        { color: 'cyan',   label: 'ADMIN',     href: '/admin.html' },
      ])
    })()
  </script>
