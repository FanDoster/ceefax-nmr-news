  <link rel="stylesheet" href="/styles.css" />
  <style>
    .ct-title { color: var(--C); font-size: var(--font-size); line-height: var(--cell-h); padding: 10px 14px 0; }
    .ct-sub { color: var(--G); font-size: 14px; padding: 2px 14px 8px; }
    .ct-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(8, auto);
      grid-auto-flow: column;
      gap: 3px 26px;
      padding: 4px 14px 12px;
    }
    .ct-row { display: flex; align-items: baseline; gap: 6px; font-size: var(--font-size); line-height: var(--cell-h); }
    .ct-city { color: var(--C); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .ct-temp { width: 4ch; text-align: right; flex-shrink: 0; }
    .ct-cond { width: 8ch; flex-shrink: 0; text-transform: uppercase; }
    .ct-cond.sun   { color: var(--Y); }
    .ct-cond.cloud { color: var(--W); }
    .ct-cond.rain  { color: var(--C); }
    .ct-cond.snow  { color: var(--W); }
    .ct-cond.fog   { color: var(--W); }
    .ct-cond.storm { color: var(--M); }
    .ct-msg { color: var(--Y); padding: 24px 14px; font-size: var(--font-size); }
  </style>
</head>
<body>
  <div class="ceefax-page">
    <div id="header"></div>
    <div id="content"><div class="ceefax-loading">LOADING...</div></div>
    <div class="ceefax-fastext" id="fastext"></div>
  </div>

  <!-- No Supabase — weather is from Open-Meteo (free, no key). -->
  <script src="/common.js"></script>
  <script>
    CX.renderHeader('402', 'WEATHER', 'UK CITY TEMPERATURES')
    var stopScan = CX.scanPage('402')

    var CITIES = [
      { name: 'LONDON',     lat: 51.51, lon: -0.13 },
      { name: 'BIRMINGHAM', lat: 52.48, lon: -1.90 },
      { name: 'MANCHESTER', lat: 53.48, lon: -2.24 },
      { name: 'LEEDS',      lat: 53.80, lon: -1.55 },
      { name: 'LIVERPOOL',  lat: 53.41, lon: -2.99 },
      { name: 'NEWCASTLE',  lat: 54.98, lon: -1.61 },
      { name: 'SHEFFIELD',  lat: 53.38, lon: -1.47 },
      { name: 'BRISTOL',    lat: 51.45, lon: -2.59 },
      { name: 'NOTTINGHAM', lat: 52.95, lon: -1.15 },
      { name: 'NORWICH',    lat: 52.63, lon:  1.30 },
      { name: 'CARDIFF',    lat: 51.48, lon: -3.18 },
      { name: 'PLYMOUTH',   lat: 50.38, lon: -4.14 },
      { name: 'EDINBURGH',  lat: 55.95, lon: -3.19 },
      { name: 'GLASGOW',    lat: 55.86, lon: -4.25 },
      { name: 'ABERDEEN',   lat: 57.15, lon: -2.09 },
      { name: 'BELFAST',    lat: 54.60, lon: -5.93 },
    ]

    function condition(code) {
      if (code === 0) return { text: 'CLEAR', cls: 'sun' }
      if (code <= 2) return { text: 'SUNNY', cls: 'sun' }
      if (code === 3) return { text: 'CLOUDY', cls: 'cloud' }
      if (code === 45 || code === 48) return { text: 'FOG', cls: 'fog' }
      if (code >= 51 && code <= 57) return { text: 'DRIZZLE', cls: 'rain' }
      if (code >= 61 && code <= 67) return { text: 'RAIN', cls: 'rain' }
      if (code >= 71 && code <= 77) return { text: 'SNOW', cls: 'snow' }
      if (code >= 80 && code <= 82) return { text: 'SHOWERS', cls: 'rain' }
      if (code >= 85 && code <= 86) return { text: 'SNOW', cls: 'snow' }
      if (code >= 95) return { text: 'THUNDER', cls: 'storm' }
      return { text: 'CLOUDY', cls: 'cloud' }
    }
    // Temperature -> teletext colour, cold (white/cyan) to hot (red/magenta).
    function tempColor(t) {
      if (t <= 3) return 'var(--W)'
      if (t <= 10) return 'var(--C)'
      if (t <= 16) return 'var(--G)'
      if (t <= 22) return 'var(--Y)'
      if (t <= 29) return 'var(--R)'
      return 'var(--M)'
    }

    function ctFastext() {
      CX.renderFastext([
        { color: 'red',    label: 'MAP',       href: '/weather.html' },
        { color: 'green',  label: 'STARS',     href: '/horoscopes.html' },
        { color: 'yellow', label: 'REFRESH',   href: '/cities.html' },
        { color: 'cyan',   label: 'HEADLINES', href: '/' },
      ])
    }

    ;(async function () {
      var content = document.getElementById('content')
      var lats = CITIES.map(function (c) { return c.lat }).join(',')
      var lons = CITIES.map(function (c) { return c.lon }).join(',')
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lats + '&longitude=' + lons +
        '&current=temperature_2m,weather_code&timezone=Europe%2FLondon'

      var data = null
      try {
        var res = await Promise.all([CX.cachedJSON(url, 10 * 60 * 1000), CX.delay(1000)])
        data = res[0]
      } catch (e) { data = null }
      stopScan()

      if (!data) {
        CX.setStatus('WEATHER OFF AIR')
        content.innerHTML = '<div class="ct-msg">Weather data is off air.<br>Press REFRESH to try again.</div>'
        ctFastext()
        return
      }

      var arr = Array.isArray(data) ? data : [data]
      var rows = CITIES.map(function (c, i) {
        var cur = arr[i] && arr[i].current
        if (!cur) return ''
        var temp = Math.round(cur.temperature_2m)
        var cond = condition(cur.weather_code)
        return '<div class="ct-row">' +
          '<span class="ct-city">' + CX.escapeHTML(c.name) + '</span>' +
          '<span class="ct-temp" style="color:' + tempColor(temp) + '">' + temp + 'C</span>' +
          '<span class="ct-cond ' + cond.cls + '">' + cond.text + '</span>' +
          '</div>'
      }).join('')

      var now = new Date()
      var hh = String(now.getHours()).padStart(2, '0')
      var mm = String(now.getMinutes()).padStart(2, '0')

      content.innerHTML =
        '<div class="ct-title">UK CITIES — CURRENT CONDITIONS</div>' +
        '<div class="ct-sub">UPDATED ' + hh + ':' + mm + '  —  TEMPERATURES IN &deg;C</div>' +
        '<div class="ct-grid">' + rows + '</div>'

      ctFastext()
    })()
  </script>
</body>
