%3D%22%2300FF00%22%2F%3E%3Crect%20x%3D%2215%22%20y%3D%223%22%20width%3D%221%22%20height%3D%221%22%20fill%3D%22%2300FF00%22%2F%3E%3Crect%20x%3D%2212%22%20y%3D%224%22%20width%3D%221%22%20height%3D%221%22%20fill%3D%22%2300FF00%22%2F%3E%3Crect%20x%3D%2216%22%20y%3D%224%22%20width%3D%221%22%20height%3D%221%22%20fill%3D%22%2300FF00%22%2F%3E%3C%2Fsvg%3E" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .wx-body { position: relative; padding: 4px 8px; min-height: 470px; }
    .wx-cond { position: absolute; top: 130px; left: 14px; color: var(--C); font-size: 26px; }
    /* Temperature colour key */
    .wx-key { position: absolute; top: 190px; left: 14px; font-size: 15px; line-height: 18px; }
    .wx-key-title { color: var(--W); margin-bottom: 3px; }
    .wx-key-row { display: flex; align-items: center; gap: 7px; color: var(--W); }
    .wx-key .sw { width: 15px; height: 13px; flex-shrink: 0; }
    .wx-map { display: flex; justify-content: center; }
    .wx-map-wrap { position: relative; width: 384px; }
    .wx-map-svg { width: 384px; height: auto; display: block; image-rendering: pixelated; }
    /* temperature labels overlaid on the map — white on a black box */
    .wx-t {
      position: absolute;
      transform: translate(-50%, -50%);
      color: var(--W);
      background: var(--K);
      font-size: 17px;
      line-height: 1.1;
      padding: 0 2px;
    }
    /* OFF AIR "no data" state — a teletext fault card. The refresh action lives
       on the RED FASTEXT key below, exactly as a real teletext set would. */
    .wx-offair { padding: 30px 10px 0; }
    .wx-offair .ceefax-hl-cyan { margin-bottom: 14px; }
    .wx-offair .ceefax-body { max-width: 32ch; }
    .wx-source {
      background: var(--B);
      color: var(--W);
      text-align: center;
      font-size: var(--font-size);
      line-height: var(--cell-h);
      padding: 3px 2px;
    }
    .ceefax-fastext .fx { cursor: pointer; }
  </style>
</head>
<body>
  <div class="ceefax-page">
    <div id="header"></div>
    <div class="wx-body" id="wx-body"><div class="ceefax-loading">LOADING...</div></div>
    <div class="wx-source">Data from Open-Meteo</div>
    <div class="ceefax-fastext" id="fastext"></div>
  </div>

  <!-- No Supabase — weather is from Open-Meteo (free, no key). -->
  <script src="/common.js"></script>
  <script>
    var DAYS_FULL = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']

    CX.renderHeader('401', 'WEATHER', 'THREE-DAY FORECAST')
    var stopScan = CX.scanPage('401')

    // ---- The UK + Ireland as a teletext mosaic ----
    // Rasterised from Natural Earth 50m boundaries. '#' = land, projected in this
    // lat/lon bounding box so a city's grid position comes straight from its coords.
    var UK_COLS = 40, UK_ROWS = 47
    var UK_BBOX = { w: -11.0, e: 2.0, s: 49.9, n: 58.8 }
    var UK = [
      "                                        ",
      "                  ######                ",
      "             ##   ######                ",
      "            ##   ######                 ",
      "             #    ####                  ",
      "                ######                  ",
      "              # ############            ",
      "             ## ############            ",
      "                 ###########            ",
      "                ###########             ",
      "                ###########             ",
      "                # ########              ",
      "                 #######                ",
      "                 #########              ",
      "                  #### #                ",
      "              ##   ########             ",
      "                ## #########            ",
      "                ## ##########           ",
      "           #       ##########           ",
      "        #######   ###########           ",
      "        ########  ##### ######          ",
      "       #########       #######          ",
      "         #######       #########        ",
      "       ##########      #########        ",
      "   #############        #########       ",
      "  ############           ########       ",
      "    ###########          #########      ",
      "    ###########         ##########      ",
      "   ############     #   ##########      ",
      "      #########     ###############     ",
      "     ##########     ##############      ",
      "     ##########      #################  ",
      "     ##########      ################## ",
      "    ##########       ################## ",
      "    ##########       ################## ",
      "   ########        #################### ",
      "  #######         ####################  ",
      "   #####          #  ################   ",
      "                      ## ###########    ",
      "                         #############  ",
      "                     #################  ",
      "                    #################   ",
      "                    #########           ",
      "                   ####                 ",
      "                  #####                 ",
      "                 ##                     ",
      "                                        ",
    ]
    function mapSVG() {
      var rects = ''
      for (var r = 0; r < UK.length; r++) {
        for (var c = 0; c < UK[r].length; c++) {
          if (UK[r][c] !== ' ') {
            rects += '<rect x="' + (c + 0.12) + '" y="' + (r + 0.12) + '" width="0.76" height="0.76" fill="var(--C)"/>'
          }
        }
      }
      return '<svg viewBox="0 0 ' + UK_COLS + ' ' + UK_ROWS + '" class="wx-map-svg" shape-rendering="crispEdges">' + rects + '</svg>'
    }
    // A city's lat/lon -> percentage position over the map.
    function pos(lat, lon) {
      return {
        left: ((lon - UK_BBOX.w) / (UK_BBOX.e - UK_BBOX.w) * 100).toFixed(1),
        top: ((UK_BBOX.n - lat) / (UK_BBOX.n - UK_BBOX.s) * 100).toFixed(1),
      }
    }

    var SPOTS = [
      { name: 'INVERNESS',  lat: 57.48, lon: -4.22 },
      { name: 'ABERDEEN',   lat: 57.15, lon: -2.09 },
      { name: 'GLASGOW',    lat: 55.86, lon: -4.25 },
      { name: 'NEWCASTLE',  lat: 54.98, lon: -1.61 },
      { name: 'BELFAST',    lat: 54.60, lon: -5.93 },
      { name: 'MANCHESTER', lat: 53.48, lon: -2.24 },
      { name: 'NORWICH',    lat: 52.63, lon:  1.30 },
      { name: 'BIRMINGHAM', lat: 52.48, lon: -1.90 },
      { name: 'CARDIFF',    lat: 51.48, lon: -3.18 },
      { name: 'LONDON',     lat: 51.51, lon: -0.13 },
      { name: 'PLYMOUTH',   lat: 50.38, lon: -4.14 },
    ]

    function condWord(code) {
      if (code === 0) return 'Clear'
      if (code <= 2) return 'Sunny'
      if (code === 3) return 'Cloudy'
      if (code === 45 || code === 48) return 'Fog'
      if (code >= 51 && code <= 57) return 'Drizzle'
      if (code >= 61 && code <= 67) return 'Rain'
      if (code >= 71 && code <= 77) return 'Snow'
      if (code >= 80 && code <= 82) return 'Showers'
      if (code >= 85 && code <= 86) return 'Snow'
      if (code >= 95) return 'Thunder'
      return 'Cloudy'
    }
    function modal(arr) {
      var counts = {}, best = arr[0], bestN = 0
      arr.forEach(function (v) { counts[v] = (counts[v] || 0) + 1; if (counts[v] > bestN) { bestN = counts[v]; best = v } })
      return best
    }

    // Temperature -> teletext colour, cold (white/cyan) to hot (red/magenta).
    function tempColor(t) {
      if (t <= 3) return 'var(--W)'
      if (t <= 10) return 'var(--C)'
      if (t <= 16) return 'var(--G)'
      if (t <= 22) return 'var(--Y)'
      if (t <= 29) return 'var(--R)'
      return 'var(--M)'
    }
    var KEY_ROWS = [
      ['var(--M)', '30+'], ['var(--R)', '23-29'], ['var(--Y)', '17-22'],
      ['var(--G)', '11-16'], ['var(--C)', '4-10'], ['var(--W)', '0-3'],
    ]
    var KEY_HTML = '<div class="wx-key"><div class="wx-key-title">TEMP &deg;C</div>' +
      KEY_ROWS.map(function (k) {
        return '<div class="wx-key-row"><span class="sw" style="background:' + k[0] + '"></span>' + k[1] + '</div>'
      }).join('') + '</div>'

    var forecast = {}, dayNames = [], day = 0

    function render() {
      CX.setStatus('WEATHER FOR ' + (dayNames[day] || '') + '  ' + (day + 1) + '/3')
      var codes = []
      var labels = SPOTS.map(function (s) {
        var f = forecast[s.name]
        if (!f) return ''
        var t = f.max[day]
        codes.push(f.code[day])
        var p = pos(s.lat, s.lon)
        return '<span class="wx-t" style="left:' + p.left + '%;top:' + p.top + '%;color:' + tempColor(t) + '">' + t + '</span>'
      }).join('')

      document.getElementById('wx-body').innerHTML =
        '<div class="wx-cond">' + (codes.length ? condWord(modal(codes)) : '') + '</div>' +
        KEY_HTML +
        '<div class="wx-map"><div class="wx-map-wrap">' + mapSVG() + labels + '</div></div>'
    }

    // Changing day loads like a real teletext page: hold the acquisition scan
    // + LOADING for a beat, then draw the new day (data is already fetched).
    var loadTimer = null, loadStop = null
    function showDay(d) {
      day = (d + 3) % 3
      if (loadTimer) { clearTimeout(loadTimer); if (loadStop) loadStop() }
      document.getElementById('wx-body').innerHTML = '<div class="ceefax-loading">LOADING...</div>'
      loadStop = CX.scanPage('401')
      loadTimer = setTimeout(function () {
        if (loadStop) loadStop()
        loadStop = null; loadTimer = null
        render()
      }, 800)
    }

    // Auto-cycle the three days, like a real teletext subpage carousel that
    // rotates on a timer. Manual PREV/NEXT restart the countdown; a hidden tab
    // pauses it so it isn't churning in the background.
    var cycleTimer = null
    function startCycle() {
      if (cycleTimer) clearInterval(cycleTimer)
      cycleTimer = setInterval(function () { showDay(day + 1) }, 15000)
    }
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) { clearInterval(cycleTimer); cycleTimer = null }
      else startCycle()
    })

    function wxFastext() {
      var host = document.getElementById('fastext')
      host.innerHTML =
        '<span class="fx red" id="wx-prev"><span class="lbl">- PREV</span></span>' +
        '<span class="fx green" id="wx-next"><span class="lbl">+ NEXT</span></span>' +
        '<a class="fx yellow" href="/cities.html"><span class="lbl">CITIES</span></a>' +
        '<a class="fx cyan" href="/"><span class="lbl">HEADLINES</span></a>'
      document.getElementById('wx-prev').onclick = function () { showDay(day - 1); startCycle() }
      document.getElementById('wx-next').onclick = function () { showDay(day + 1); startCycle() }
    }

    // Off-air "no data" screen, styled as a teletext fault card. The refresh
    // action is the RED FASTEXT key (also reachable by pressing R), like a set.
    function showOffAir() {
      CX.setStatus('WEATHER OFF AIR')
      document.getElementById('wx-body').innerHTML =
        '<div class="wx-offair">' +
          '<div class="ceefax-hl-cyan">OFF AIR</div>' +
          '<div class="ceefax-body">The latest forecast could not be tuned in just now.</div>' +
          '<div class="ceefax-body">It will return shortly, or press the RED key to refresh.</div>' +
          '<div style="margin-top:16px"><span class="ceefax-flash red">REFRESH</span></div>' +
        '</div>'
      offAirFastext()
    }

    // FASTEXT bar for the off-air screen: RED refreshes (retunes), the rest
    // are escape hatches. PREV/NEXT are omitted — there's no forecast to page.
    function offAirFastext() {
      var host = document.getElementById('fastext')
      host.innerHTML =
        '<span class="fx red" id="wx-refresh"><span class="lbl">REFRESH</span></span>' +
        '<a class="fx green" href="/sport.html"><span class="lbl">SPORT</span></a>' +
        '<a class="fx yellow" href="/cities.html"><span class="lbl">CITIES</span></a>' +
        '<a class="fx cyan" href="/"><span class="lbl">HEADLINES</span></a>'
      document.getElementById('wx-refresh').onclick = function () { location.reload() }
    }

    ;(async function () {
      var lats = SPOTS.map(function (s) { return s.lat }).join(',')
      var lons = SPOTS.map(function (s) { return s.lon }).join(',')
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lats + '&longitude=' + lons +
        '&daily=temperature_2m_max,weather_code&forecast_days=3&timezone=Europe%2FLondon'

      var data = null
      try {
        var res = await Promise.all([CX.cachedJSON(url, 10 * 60 * 1000), CX.delay(1000)])
        data = res[0]
      } catch (e) { data = null }
      stopScan()

      if (!data) {
        showOffAir()
        return
      }

      var arr = Array.isArray(data) ? data : [data]
      SPOTS.forEach(function (s, i) {
        var dd = arr[i] && arr[i].daily
        if (dd && dd.temperature_2m_max) forecast[s.name] = { max: dd.temperature_2m_max.map(Math.round), code: dd.weather_code }
      })

      // No usable forecast (e.g. an API error slipped through) — show OFF AIR
      // rather than an empty map with no temperatures.
      if (!Object.keys(forecast).length) {
        showOffAir()
        return
      }

      var times = (arr[0] && arr[0].daily && arr[0].daily.time) || []
      dayNames = times.map(function (t) { return DAYS_FULL[new Date(t + 'T12:00:00').getDay()] })

      render()
      wxFastext()
      startCycle()
    })()
  </script>
</body>
</html>
