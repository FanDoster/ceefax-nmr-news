    // Generic mosaic renderer: 'X' cells take `hue` (the sign's element
    // colour); every other letter maps through ART_COLORS.
    var ART_COLORS = {
      Y: 'var(--Y)', B: 'var(--B)', W: 'var(--W)',
      C: 'var(--C)', M: 'var(--M)', G: 'var(--G)', R: 'var(--R)',
    }
    function mosaicSVG(rows, cls, aria, hue) {
      var rects = ''
      for (var r = 0; r < rows.length; r++) {
        for (var c = 0; c < rows[r].length; c++) {
          var ch = rows[r][c]
          var col = ch === 'X' ? hue : ART_COLORS[ch]
          if (col) rects += '<rect x="' + c + '" y="' + r + '" width="0.9" height="0.9" fill="' + col + '"/>'
        }
      }
      return '<svg class="' + cls + '" viewBox="0 0 ' + rows[0].length + ' ' + rows.length + '" ' +
        'shape-rendering="crispEdges" role="img" aria-label="' + aria + '">' + rects + '</svg>'
    }

    // === The daily fortune engine ===
    // Seeded by date + sign so everyone sees the same reading all day, and a
    // fresh one appears at midnight. No servers were consulted; the stars know.
    function hashSeed(s) {
      var h = 2166136261
      for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) }
      return h >>> 0
    }
    function mulberry32(a) {
      return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0
        var t = Math.imul(a ^ (a >>> 15), 1 | a)
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296
      }
    }

    var PLANETS = ['The Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Neptune', 'Pluto']
    var VERBS = ['lingers', 'sparkles', 'rises', 'parks itself', 'sulks', 'blazes', 'drifts sideways', 'goes retrograde']
    var HOUSES = ['money', 'career', 'romance', 'friendship', 'travel', 'creative', 'wellbeing', 'family']
    var MOODS = [
      'Expect the unexpected, then expect it again.',
      'What felt stuck begins to move.',
      'Others notice more than you think.',
      'The timing is better than it looks.',
      'Resist the urge to check twice.',
      'An overdue answer is closer than it appears.',
    ]
    var FORTUNES = [
      'A purchase you shelved months ago finally pays off. The backlog knows.',
      'Player two enters your life when you least expect it.',
      'A high score falls this week — possibly yours, possibly a rival’s.',
      'Money arrives from a forgotten source. Check your coat pockets and your library.',
      'An old friend returns with news. Listen twice, speak once.',
      'Fame flickers near the weekend. Do not feed it after midnight.',
      'A tricky boss — at work or on screen — is beaten with patience, not force.',
      'Success favours the well-saved. Back up everything, including feelings.',
      'A stranger’s tip proves valuable. A relative’s does not.',
      'Fortune hides in the second paragraph of something dull.',
      'A small act of kindness respawns when you need it most.',
      'The thing you are avoiding takes eight minutes. The avoiding has taken weeks.',
    ]
    var ADVICE = [
      'Say yes on {DAY}.',
      'Avoid big decisions until teatime.',
      'Trust the map, not the shortcut.',
      'Do not refresh; it will come.',
      'An early night on {DAY} repays itself double.',
      'Press RED for good news.',
      'Keep your receipts and your promises.',
      'Start the small pile first.',
    ]
    var DAYS_FULL = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']
    var LUCKY_COLOURS = [
      ['CYAN', 'cyan'], ['YELLOW', 'yellow'], ['GREEN', 'green'], ['MAGENTA', 'magenta'], ['RED', 'red'],
    ]

    function todayKey() {
      var t = new Date()
      return t.getFullYear() + '-' + (t.getMonth() + 1) + '-' + t.getDate()
    }
    function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)] }

    function readingFor(signIdx) {
      var rng = mulberry32(hashSeed(todayKey() + ':' + SIGNS[signIdx].name))
      var day = pick(rng, DAYS_FULL)
      return {
        paras: [
          pick(rng, PLANETS) + ' ' + pick(rng, VERBS) + ' in your ' + pick(rng, HOUSES) + ' house. ' + pick(rng, MOODS),
          pick(rng, FORTUNES),
          pick(rng, ADVICE).replace('{DAY}', day),
        ],
        luckyPage: 101 + Math.floor(rng() * 18),
        colour: pick(rng, LUCKY_COLOURS),
      }
    }

    // === Rendering ===
    var params = new URLSearchParams(location.search)
    var pnum = parseInt(params.get('p'), 10)
    var signIdx = (pnum >= FIRST_PAGE && pnum < FIRST_PAGE + 12) ? pnum - FIRST_PAGE : -1
    var page = signIdx >= 0 ? String(pnum) : '560'

    CX.renderHeader(page, 'YOUR STARS', 'MYSTIC MEG — DAILY HOROSCOPES')
    var stopScan = CX.scanPage(page)

    function coverHTML() {
      var index = SIGNS.map(function (s, i) {
        return '<a href="/horoscopes.html?p=' + (FIRST_PAGE + i) + '">' +
          '<span class="pn">' + (FIRST_PAGE + i) + '</span>' + s.name + '</a>'
      }).join('')
      return megHTML('MYSTIC MEG') +
        '<div class="ceefax-text">' +
          '<div class="ceefax-hl-yellow">BY MYSTIC MEG</div>' +
          '<div class="ceefax-body">What does the future hold for you? Find out by reading your daily horoscope on the following pages.</div>' +
          '<div class="ceefax-body star-teaser">Money? Fame? Success? Failure?</div>' +
          '<div class="star-index">' + index + '</div>' +
          '<a class="star-more" href="/horoscopes.html?p=' + FIRST_PAGE + '">Find out more &gt;</a>' +
        '</div>'
    }

    function signHTML(i) {
      var s = SIGNS[i]
      var r = readingFor(i)
      var t = new Date()
      var today = (DAYS_FULL[t.getDay()] + ' ' + t.getDate()).toUpperCase()
      var paras = r.paras.map(function (p) {
        return '<div class="ceefax-body">' + p + '</div>'
      }).join('')
      return signArtHTML(i) +
        '<div class="ceefax-text">' +
          '<div class="ceefax-hl-cyan">' + s.name + '</div>' +
          '<div class="ceefax-hl-yellow">' + s.dates + ' &middot; ' + today + '</div>' +
          paras +
          '<div class="star-lucky ceefax-body">LUCKY PAGE: <a href="/story.html?p=' + r.luckyPage + '">P' + r.luckyPage + '</a></div>' +
          '<div><span class="ceefax-flash ' + r.colour[1] + '">LUCKY COLOUR: ' + r.colour[0] + '</span></div>' +
        '</div>'
    }

    setTimeout(function () {
      stopScan()
      if (signIdx < 0) {
        document.title = 'CEEFAX NMR NEWS — P560 YOUR STARS'
        document.getElementById('content').innerHTML = coverHTML()
        CX.renderFastext([
          { color: 'red',    label: 'HEADLINES', href: '/' },
          { color: 'green',  label: 'WEATHER',   href: '/weather.html' },
          { color: 'yellow', label: 'SPORT',     href: '/sport.html' },
          { color: 'cyan',   label: 'CITIES',    href: '/cities.html' },
        ])
      } else {
        document.title = 'CEEFAX NMR NEWS — P' + pnum + ' ' + SIGNS[signIdx].name
        document.getElementById('content').innerHTML = signHTML(signIdx)
        var prev = FIRST_PAGE + (signIdx + 11) % 12
        var next = FIRST_PAGE + (signIdx + 1) % 12
        CX.renderFastext([
          { color: 'red',    label: 'YOUR STARS', href: '/horoscopes.html' },
          { color: 'green',  label: 'PREV',       href: '/horoscopes.html?p=' + prev },
          { color: 'yellow', label: 'NEXT',       href: '/horoscopes.html?p=' + next },
          { color: 'cyan',   label: 'HEADLINES',  href: '/' },
        ])
      }
    }, 700)
  </script>
</body>
</html>
