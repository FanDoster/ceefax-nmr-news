%3D%22%2300FF00%22%2F%3E%3Crect%20x%3D%2215%22%20y%3D%223%22%20width%3D%221%22%20height%3D%221%22%20fill%3D%22%2300FF00%22%2F%3E%3Crect%20x%3D%2212%22%20y%3D%224%22%20width%3D%221%22%20height%3D%221%22%20fill%3D%22%2300FF00%22%2F%3E%3Crect%20x%3D%2216%22%20y%3D%224%22%20width%3D%221%22%20height%3D%221%22%20fill%3D%22%2300FF00%22%2F%3E%3C%2Fsvg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="ceefax-page">
    <div id="header"></div>
    <div id="app"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common.js"></script>
  <script>
    var db = CX.db
    var esc = CX.escapeHTML

    // Handle email confirmation / magic-link redirects
    // Supabase sends tokens in the URL hash fragment.
    // (Leading semicolon guards against ASI: without it the previous line's
    //  `var esc = CX.escapeHTML` would parse as a call `CX.escapeHTML(...)()`.)
    ;(function handleHashToken() {
      if (!window.location.hash) return
      var h = window.location.hash.substring(1)
      if (h.indexOf('access_token=') === -1) return
      var params = {}
      h.split('&').forEach(function (p) {
        var kv = p.split('=')
        params[kv[0]] = decodeURIComponent(kv[1] || '')
      })
      if (params.access_token && params.refresh_token) {
        db.auth.setSession({
          access_token: params.access_token,
          refresh_token: params.refresh_token
        }).then(function () {
          window.location.hash = ''
          window.location.reload()
        })
      }
    })()
    var CATEGORIES = ['INDIE', 'AAA', 'ENVIRONMENT', 'EDUCATION', 'COMMUNITY',
      'ACCESSIBILITY', 'TECHNOLOGY', 'CULTURE', 'GOVERNMENT']

    var session = null
    var editingId = null
    var stories = []
    var app = document.getElementById('app')

    CX.renderHeader('199', 'ADMIN', 'SIGN IN TO MANAGE STORIES')

    db.auth.getSession().then(function (res) { session = res.data.session; render() })
    db.auth.onAuthStateChange(function (_e, s) { session = s; render() })

    function msg(type, text) {
      var el = document.getElementById('msg')
      if (el) el.innerHTML = '<div class="ceefax-msg ' + type + '">' + esc(text) + '</div>'
    }

    function render() {
      if (!session) renderLogin()
      else { renderManager(); loadStories() }
    }

    /* ---------- Admin sign-in ----------
       Login only — there is no public sign-up. Admin accounts are created in
       the Supabase dashboard (Authentication → Users). Even so, the real
       enforcement is the row-level security policy in supabase-setup.sql,
       which restricts writes to the admin account; the UI gate alone is not
       security (anyone can call the REST API directly). */
    function renderLogin() {
      CX.setStatus('SIGN IN TO MANAGE STORIES')
      app.innerHTML =
        '<div class="admin-form">' +
          '<div class="ceefax-hl-yellow" style="margin-bottom:14px">ADMIN ACCESS</div>' +
          '<div id="msg"></div>' +
          '<form id="authForm">' +
            '<div class="form-row"><label>Email</label><input type="email" id="email" required></div>' +
            '<div class="form-row"><label>Password</label><input type="password" id="password" required></div>' +
            '<button type="submit" class="btn-ceefax" id="authBtn">SIGN IN</button>' +
          '</form>' +
          '<div style="margin-top:24px"><a class="ceefax-flash cyan" href="/">HEADLINES P100</a></div>' +
        '</div>'

      document.getElementById('authForm').onsubmit = async function (e) {
        e.preventDefault()
        var res = await db.auth.signInWithPassword({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        })
        if (res.error) msg('error', res.error.message)
        // a successful sign-in fires onAuthStateChange, which re-renders.
      }
    }

    /* ---------- Story manager ---------- */
    function renderManager() {
      CX.setStatus('STORY MANAGER')
      var options = CATEGORIES.map(function (c) { return '<option>' + c + '</option>' }).join('')
      var imgOpts = '<option value="">— None —</option>' +
        CX.GRAPHICS.map(function (g) { return '<option value="' + g.path + '">' + esc(g.name) + '</option>' }).join('')
      app.innerHTML =
        '<div class="admin-form">' +
          '<div class="ceefax-hl-cyan" id="formTitle">' + (editingId ? 'EDIT STORY' : 'NEW STORY') + '</div>' +
          '<button class="btn-ceefax danger" style="float:right" id="logout">LOGOUT</button>' +
          '<div id="msg"></div>' +
          '<form id="storyForm" style="clear:both">' +
            '<div class="form-row"><label>Page Number (101+)</label><input type="number" min="101" id="pageNumber" required></div>' +
            '<div class="form-row"><label>Category</label><select id="category">' + options + '</select></div>' +
            '<div class="form-row"><label>Title</label><input type="text" id="title" required></div>' +
            '<div class="form-row"><label>Body (blank line = new paragraph)</label><textarea id="body" required></textarea></div>' +
            '<div class="form-row"><label>Story Image</label><select id="imageSelect">' + imgOpts + '</select></div>' +
            '<div class="form-row"><label>Or custom image URL</label><input type="text" id="imageUrl" placeholder="https://..."></div>' +
            '<button type="submit" class="btn-ceefax" id="submitBtn">' + (editingId ? 'UPDATE STORY' : 'PUBLISH STORY') + '</button>' +
            '<button type="button" class="btn-ceefax danger" id="cancelEdit" style="display:' + (editingId ? 'inline-block' : 'none') + '">CANCEL</button>' +
          '</form>' +
          '<div class="admin-story-list">' +
            '<div class="ceefax-hl-cyan" style="font-size:18px;margin-bottom:8px">PUBLISHED STORIES</div>' +
            '<div id="storyList"></div>' +
          '</div>' +
          '<div style="margin-top:20px"><a class="ceefax-flash cyan" href="/">HEADLINES P100</a></div>' +
        '</div>' +
        '<div class="ceefax-footer"><a href="/">HEADLINES P100</a><span class="hint">ADMIN — P199</span></div>'

      document.getElementById('logout').onclick = function () { db.auth.signOut() }
      document.getElementById('cancelEdit').onclick = function () { resetForm() }
      document.getElementById('storyForm').onsubmit = handleSubmit
      document.getElementById('storyList').onclick = onListClick
      fillForm()
    }

    function currentEditing() {
      return stories.filter(function (s) { return s.id === editingId })[0]
    }

    // Populate the form fields (used after render, e.g. when entering edit mode).
    function fillForm() {
      var s = currentEditing()
      document.getElementById('pageNumber').value = s ? s.page_number : ''
      document.getElementById('category').value = s ? s.category : 'INDIE'
      document.getElementById('title').value = s ? s.title : ''
      document.getElementById('body').value = s ? s.body : ''
      var url = s ? (s.image_url || '') : ''
      var isGraphic = CX.GRAPHICS.some(function (g) { return g.path === url })
      document.getElementById('imageSelect').value = isGraphic ? url : ''
      document.getElementById('imageUrl').value = isGraphic ? '' : url
    }

    function resetForm() {
      editingId = null
      renderManager()
    }

    async function handleSubmit(e) {
      e.preventDefault()
      var pn = parseInt(document.getElementById('pageNumber').value, 10)
      if (!pn || pn < 101) { msg('error', 'Page number must be 101+'); return }
      var payload = {
        page_number: pn,
        title: document.getElementById('title').value,
        body: document.getElementById('body').value,
        category: document.getElementById('category').value,
        image_url: (document.getElementById('imageUrl').value.trim() || document.getElementById('imageSelect').value) || null,
      }
      var res = editingId
        ? await db.from('ceefax_stories').update(payload).eq('id', editingId)
        : await db.from('ceefax_stories').insert(payload)
      if (res.error) { msg('error', res.error.message); return }
      var wasEditing = editingId
      editingId = null
      renderManager()
      msg('success', 'P' + pn + (wasEditing ? ' updated!' : ' published!'))
      loadStories()
    }

    function onListClick(e) {
      var btn = e.target.closest('button')
      if (!btn) return
      var id = Number(btn.getAttribute('data-id'))
      if (btn.getAttribute('data-action') === 'edit') {
        editingId = id
        renderManager()
        window.scrollTo({ top: 0, behavior: 'smooth' })
      } else if (btn.getAttribute('data-action') === 'del') {
        if (confirm('Delete?')) {
          db.from('ceefax_stories').delete().eq('id', id).then(loadStories)
        }
      }
    }

    async function loadStories() {
      var res = await db.from('ceefax_stories').select('*').order('page_number')
      if (res.data) stories = res.data
      var list = document.getElementById('storyList')
      if (!list) return
      list.innerHTML = stories.map(function (s) {
        return '<div class="admin-story-row">' +
          '<span class="pn">P' + s.page_number + '</span>' +
          '<span class="cat">' + esc(s.category) + '</span>' +
          '<span class="title">' + esc(s.title) + '</span>' +
          '<button data-action="edit" data-id="' + s.id + '">EDIT</button>' +
          '<button class="del" data-action="del" data-id="' + s.id + '">DEL</button>' +
          '</div>'
      }).join('')
    }
  </script>
</body>
</html>
